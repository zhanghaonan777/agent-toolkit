# Smithery configuration file: https://smithery.ai/docs/build/project-config

startCommand:
  type: stdio
  configSchema:
    # JSON Schema defining the configuration options for the MCP.
    type: object
    required:
      - paypalAccessToken
    properties:
      paypalAccessToken:
        type: string
        description: PayPal Access Token for authenticating API calls
      paypalEnvironment:
        type: string
        default: SANDBOX
        description: Environment for PayPal API ('SANDBOX' or 'PRODUCTION')
  commandFunction:
    # A JS function that produces the CLI command based on the given config to start the MCP on stdio.
    |-
    (config) => ({
      command: 'node',
      args: ['dist/index.js', '--tools=all'],
      env: {
        PAYPAL_ACCESS_TOKEN: config.paypalAccessToken,
        PAYPAL_ENVIRONMENT: config.paypalEnvironment || 'SANDBOX'
      }
    })
  exampleConfig:
    paypalAccessToken: YOUR_SANDBOX_ACCESS_TOKEN
    paypalEnvironment: SANDBOX
